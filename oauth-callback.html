<!DOCTYPE html>
<!--
  OAuth landing page. Google / Microsoft redirect here with ?code=… after the
  rep grants calendar access. No secrets here — the code is exchanged for tokens
  server-side by a Cloud Function.

  Two return paths, chosen by the `state` value the app set:
    • Web  → postMessage the code to the opener window, then close.
    • App  (state ends with ":native") → deep-link the code back into the
      installed app via us.youtility.knock://oauth-callback so the native shell
      picks it up. The app's WebView origin isn't a valid Google redirect, so
      native OAuth must land on this hosted page and bounce back.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Connecting calendar…</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0a0f1a; color:#e8eef8;
         display:grid; place-items:center; height:100vh; margin:0; text-align:center; }
</style>
</head>
<body>
<div>
  <p id="msg">Finishing calendar connection…</p>
  <p style="color:#6b7589;font-size:13px;">You can close this window.</p>
</div>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var code = params.get("code");
    var error = params.get("error");
    var state = params.get("state") || "";
    var payload = { source: "yk-oauth", code: code, error: error, state: state };
    try {
      // Installed app: hand the code back through the custom-scheme deep link.
      if (state.indexOf(":native") !== -1) {
        var q = new URLSearchParams();
        if (code) q.set("code", code);
        if (error) q.set("error", error);
        q.set("state", state);
        document.getElementById("msg").textContent = error
          ? "Connection cancelled — returning to the app…"
          : "Calendar connected — returning to the app…";
        window.location.replace("us.youtility.knock://oauth-callback?" + q.toString());
      } else if (window.opener) {
        window.opener.postMessage(payload, window.location.origin);
        document.getElementById("msg").textContent = error
          ? "Connection cancelled."
          : "Calendar connected — closing…";
        setTimeout(function () { window.close(); }, 800);
      } else {
        document.getElementById("msg").textContent =
          "Open this from the app's Settings page.";
      }
    } catch (e) {
      document.getElementById("msg").textContent = "Something went wrong: " + e.message;
    }
  })();
</script>
</body>
</html>
