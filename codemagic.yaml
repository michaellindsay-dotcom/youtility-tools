# ============================================================================
# Codemagic CI — build, sign, and ship YoutilityKnock to BOTH stores, no Mac.
#   • ios-release      → signed IPA → TestFlight → App Store  (Apple)
#   • android-release  → signed AAB → Internal track → Play   (Google)
#
# The web bundle, the native iOS/Android projects, the app icons and the
# splash screens are all generated fresh on every build from this repo —
# nothing native is committed. You only supply signing credentials once in
# the Codemagic UI (steps below).
# ============================================================================
#
# ── ONE-TIME SETUP ─────────────────────────────────────────────────────────
#
# APPLE  (for the ios-release workflow)
#   1. Enroll in the Apple Developer Program (developer.apple.com, $99/yr).
#   2. App Store Connect → Users and Access → Integrations → App Store Connect
#      API → generate a key (Admin or App Manager). Download the .p8.
#   3. Codemagic → Teams → your team → Integrations → App Store Connect:
#      add that key and NAME IT EXACTLY:  YoutilityKnock ASC
#   4. App Store Connect → My Apps → "+" → New App:
#      Platform iOS, Name "YoutilityKnock", Bundle ID  us.youtility.knock
#      (Codemagic can also auto-register the bundle id on the first build.)
#
# GOOGLE  (for the android-release workflow)
#   1. Pay the one-time Google Play Developer fee ($25) at play.google.com/console.
#   2. Create the app in Play Console: name "YoutilityKnock",
#      package name  us.youtility.knock.
#   3. Generate an upload keystore (once) and upload it to Codemagic:
#        keytool -genkey -v -keystore youtilityknock.keystore \
#          -alias youtilityknock -keyalg RSA -keysize 2048 -validity 10000
#      Codemagic → Teams → Code signing identities → Android keystores →
#      upload it with reference name EXACTLY:  youtilityknock_keystore
#   4. Create a Play service account with the "Release manager" role and
#      download its JSON key (Play Console → Users and permissions, and
#      Google Cloud → IAM → Service Accounts). In Codemagic add an
#      environment-variable group named "google_play" with one secure
#      variable:  GCLOUD_SERVICE_ACCOUNT_CREDENTIALS = <the JSON, pasted whole>.
#   5. The very FIRST Android release must be uploaded to Play manually (the
#      service-account API can only update an app that already has one build).
#      After that, android-release ships to the Internal track automatically.
#
# Then run each workflow from the Codemagic UI. Promote builds to the public
# store from App Store Connect / Play Console when you're ready.
# ============================================================================

definitions:
  scripts:
    - &build_web
      name: Build the web bundle (native mode)
      script: |
        npm --prefix youtilityknock-web install
        npm --prefix youtilityknock-web run build:native

workflows:

  # ──────────────────────────────────────────────────────────────────────────
  # iOS → TestFlight / App Store
  # ──────────────────────────────────────────────────────────────────────────
  ios-release:
    name: YoutilityKnock iOS
    # Only build when you push a release tag (e.g. v1.1) — NOT on every push or
    # PR. This stops the heavy signed App Store build (and any signing red X)
    # from running on routine web/admin changes. Cut a real iOS build with:
    #   git tag v1.1 && git push origin v1.1
    # (Also set the Codemagic UI build trigger to "tag" to match this.)
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: YoutilityKnock ASC
    environment:
      # No `ios_signing:` block on purpose. That block makes Codemagic run its
      # own automatic-signing prep at init, which fails immediately on a brand-
      # new account ("No matching profiles found") before any script can create
      # the cert/profile. Instead we do all signing explicitly in the "Set up
      # code signing" script below (fetch-signing-files --create), which both
      # creates the cert + App Store profile via the API key and prints real
      # logs if anything is still wrong.
      groups:
        # Provides CERTIFICATE_PRIVATE_KEY — the RSA private key used to create
        # (once) and then reuse the iOS Distribution certificate. Without it a
        # fresh account can't create a cert, so no profile, so the archive fails
        # with "requires a provisioning profile".
        - ios_signing
      vars:
        # Marketing version shown on the App Store. Bump this for each public
        # release (it flows into agvtool new-marketing-version below).
        VERSION_NAME: "1.5"
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - *build_web
      - name: Create iOS project & sync Capacitor
        script: |
          cd youtilityknock-web
          npm install @capacitor/ios
          # Push needs a Firebase config (GoogleService-Info.plist). Without it,
          # strip the Firebase Messaging plugin BEFORE cap sync so the native app
          # never tries to configure Firebase at launch — that would crash the app
          # on open. With the plist env var set, the plugin stays and push works.
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "GOOGLE_SERVICE_INFO_PLIST not set — removing @capacitor-firebase/messaging so the app launches without Firebase."
            npm uninstall @capacitor-firebase/messaging || true
          fi
          [ -d ios ] || npx cap add ios
          npx cap sync ios
          # iPhone-only (TARGETED_DEVICE_FAMILY=1). YoutilityKnock is a field
          # phone app; dropping iPad avoids the iPad screenshot/review overhead
          # on every App Store submission. Capacitor defaults to "1,2".
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1,2"/TARGETED_DEVICE_FAMILY = "1"/g' \
            ios/App/App.xcodeproj/project.pbxproj
      - name: Firebase push config (iOS) — only when GOOGLE_SERVICE_INFO_PLIST is set
        script: |
          # Guarded: with no GOOGLE_SERVICE_INFO_PLIST env var, this is a no-op and
          # the build is unchanged. Set that secure var (base64 of your Firebase
          # GoogleService-Info.plist) to turn push on. You must also enable the
          # Push Notifications capability on the us.youtility.knock App ID and add
          # the APNs key in Firebase → Cloud Messaging.
          cd youtilityknock-web
          if [ -z "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "GOOGLE_SERVICE_INFO_PLIST not set — skipping iOS push setup (push inactive, build unaffected)."; exit 0
          fi
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/App/App/GoogleService-Info.plist
          ENT=ios/App/App/App.entitlements
          P=/usr/libexec/PlistBuddy
          [ -f "$ENT" ] || printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' '<plist version="1.0"><dict/></plist>' > "$ENT"
          $P -c "Set :aps-environment production" "$ENT" 2>/dev/null || $P -c "Add :aps-environment string production" "$ENT"
          gem install xcodeproj --no-document >/dev/null 2>&1 || sudo gem install xcodeproj --no-document
          ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open("ios/App/App.xcodeproj")
            target = proj.targets.find { |t| t.name == "App" }
            group = proj.main_group.find_subpath("App", true)
            unless group.files.any? { |f| f.path == "GoogleService-Info.plist" }
              target.add_resources([group.new_reference("GoogleService-Info.plist")])
            end
            target.build_configurations.each { |c| c.build_settings["CODE_SIGN_ENTITLEMENTS"] = "App/App.entitlements" }
            proj.save
          '
          echo "iOS push config injected."
      - name: Generate app icons & splash screens
        script: |
          cd youtilityknock-web
          npx capacitor-assets generate --ios \
            --iconBackgroundColor '#0ea5e9' --iconBackgroundColorDark '#0f1727' \
            --splashBackgroundColor '#0f1727' --splashBackgroundColorDark '#0f1727'
      - name: Inject iOS permission strings (location / camera / photos / mic)
        script: |
          PLIST=youtilityknock-web/ios/App/App/Info.plist
          P=/usr/libexec/PlistBuddy
          set_or_add () {
            $P -c "Set :$1 $2" "$PLIST" 2>/dev/null || $P -c "Add :$1 string $2" "$PLIST"
          }
          set_or_add NSLocationWhenInUseUsageDescription "YoutilityKnock uses your location to show nearby homes and confirm on-site knocks."
          set_or_add NSCameraUsageDescription "Used to photograph the home and the utility bill on a lead."
          set_or_add NSPhotoLibraryUsageDescription "Attach photos to a lead."
          # Pitch coaching records the rep's pitch from the disposition modal.
          # Without this string iOS KILLS the app the instant getUserMedia runs
          # (opening any lead crashed the app once a rep had consented to
          # recording), so it must ship in every build even though the feature
          # is opt-in.
          set_or_add NSMicrophoneUsageDescription "Records your sales pitch (only after you opt in) so you can get AI coaching feedback."
          # Declare no non-exempt encryption (the app only uses standard HTTPS),
          # so App Store Connect skips the export-compliance question on every
          # upload and the build reaches TestFlight without stalling.
          $P -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST" 2>/dev/null || $P -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST"
          # Lock the app to portrait — it's a one-handed field app, so rotation
          # is undesirable. Replace the orientation array with portrait only.
          $P -c "Delete :UISupportedInterfaceOrientations" "$PLIST" 2>/dev/null || true
          $P -c "Add :UISupportedInterfaceOrientations array" "$PLIST"
          $P -c "Add :UISupportedInterfaceOrientations:0 string UIInterfaceOrientationPortrait" "$PLIST"
          # Register the us.youtility.knock:// URL scheme so the calendar OAuth
          # flow can deep-link the auth code back from the system browser into
          # the app (Google rejects the WebView's own origin as a redirect URI).
          if ! $P -c "Print :CFBundleURLTypes" "$PLIST" >/dev/null 2>&1; then
            $P -c "Add :CFBundleURLTypes array" "$PLIST"
            $P -c "Add :CFBundleURLTypes:0 dict" "$PLIST"
            $P -c "Add :CFBundleURLTypes:0:CFBundleURLName string us.youtility.knock" "$PLIST"
            $P -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$PLIST"
            $P -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string us.youtility.knock" "$PLIST"
          fi
      - name: Install CocoaPods
        script: |
          cd youtilityknock-web/ios/App && pod install
      - name: Set marketing version & build number
        script: |
          cd youtilityknock-web/ios/App
          # Marketing version (CFBundleShortVersionString) = the public
          # major.minor from VERSION_NAME PLUS an auto-incrementing patch tied to
          # Codemagic's build index. So every build is a fresh, always-increasing
          # App Store "release train" and never hits "the train version X is
          # closed for new build submissions" once a version has been released.
          # Bump VERSION_NAME only for a real public milestone (e.g. 1.4 → 1.5).
          MARKETING_VERSION="${VERSION_NAME:-1.0}.${BUILD_NUMBER}"
          echo "Marketing version: $MARKETING_VERSION (build $BUILD_NUMBER)"
          agvtool new-marketing-version "$MARKETING_VERSION"
          # Build number (CFBundleVersion) — Codemagic's incrementing index.
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Fetch signing profiles & build IPA
        script: |
          cd youtilityknock-web/ios/App
          # Create the distribution certificate + App Store provisioning profile
          # via the App Store Connect API key, then apply them. `--create` makes
          # the very first build work from scratch — a brand-new account has no
          # cert/profile yet, so plain `use-profiles` finds nothing. On later
          # builds these already exist and are simply fetched (no duplicates).
          keychain initialize
          # CERTIFICATE_PRIVATE_KEY is stored base64-encoded (single line) to
          # survive pasting into the Codemagic UI without newline mangling —
          # passing the raw multi-line PEM via @env failed validation. Decode it
          # back to a real PEM file and hand that to fetch-signing-files.
          printf '%s' "$CERTIFICATE_PRIVATE_KEY" | openssl base64 -d -A > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "us.youtility.knock" \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme "App"
    artifacts:
      - youtilityknock-web/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Expire any build still sitting in beta review before submitting this one.
        # Apple only allows one build in external beta review at a time and rejects
        # a new submission with "422: Submission limit has been reached" while an
        # older one is pending — this clears the stuck submission automatically so
        # each new TestFlight build goes through.
        expire_build_submitted_for_review: true

  # ──────────────────────────────────────────────────────────────────────────
  # Android → Google Play (Internal track)
  # ──────────────────────────────────────────────────────────────────────────
  android-release:
    name: YoutilityKnock Android
    # Same as iOS: only build on a release tag (e.g. v1.1), not on every push.
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    instance_type: linux_x2
    max_build_duration: 60
    environment:
      android_signing:
        - youtilityknock_keystore
      groups:
        - google_play          # provides GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
      vars:
        VERSION_NAME: "1.5"    # keep in sync with the iOS workflow above
      node: 20
      java: 17
    scripts:
      - *build_web
      - name: Create Android project & sync Capacitor
        script: |
          cd youtilityknock-web
          npm install @capacitor/android
          # Same guard as iOS: without google-services.json, strip the Firebase
          # Messaging plugin before cap sync so the app doesn't require Firebase.
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON not set — removing @capacitor-firebase/messaging so the app launches without Firebase."
            npm uninstall @capacitor-firebase/messaging || true
          fi
          [ -d android ] || npx cap add android
          npx cap sync android
      - name: Firebase push config (Android) — only when GOOGLE_SERVICES_JSON is set
        script: |
          # Guarded: with no GOOGLE_SERVICES_JSON env var, this is a no-op and the
          # build is unchanged. Set that secure var (base64 of your Firebase
          # google-services.json) to turn push on.
          cd youtilityknock-web
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON not set — skipping Android push setup (push inactive, build unaffected)."; exit 0
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          # Apply the Google Services gradle plugin so the json is processed.
          grep -q "com.google.gms:google-services" android/build.gradle || \
            sed -i "0,/dependencies {/s//dependencies {\n        classpath 'com.google.gms:google-services:4.4.2'/" android/build.gradle
          grep -q "com.google.gms.google-services" android/app/build.gradle || \
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          echo "Android push config injected."
      - name: Generate app icons & splash screens
        script: |
          cd youtilityknock-web
          npx capacitor-assets generate --android \
            --iconBackgroundColor '#0ea5e9' --iconBackgroundColorDark '#0f1727' \
            --splashBackgroundColor '#0f1727' --splashBackgroundColorDark '#0f1727'
      - name: Add location & microphone permissions to AndroidManifest
        script: |
          # The @capacitor/geolocation plugin ships an empty manifest, so the
          # app must declare its own location permissions or getCurrentPosition
          # silently fails on Android.
          MANIFEST=youtilityknock-web/android/app/src/main/AndroidManifest.xml
          grep -q 'ACCESS_FINE_LOCATION' "$MANIFEST" || \
            sed -i 's#</manifest>#    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n</manifest>#' "$MANIFEST"
          # Pitch coaching records audio via getUserMedia; without RECORD_AUDIO
          # the WebView denies the mic and recording silently never happens.
          grep -q 'RECORD_AUDIO' "$MANIFEST" || \
            sed -i 's#</manifest>#    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n</manifest>#' "$MANIFEST"
          # Lock MainActivity to portrait (field app — no rotation).
          grep -q 'android:screenOrientation' "$MANIFEST" || \
            sed -i 's#android:name=".MainActivity"#android:name=".MainActivity"\n            android:screenOrientation="portrait"#' "$MANIFEST"
          # Register the us.youtility.knock:// deep link so calendar OAuth can
          # hand the auth code back from the browser into the app (Google won't
          # accept the WebView origin as a redirect URI). Added as its own
          # intent-filter on MainActivity.
          grep -q 'android:scheme="us.youtility.knock"' "$MANIFEST" || \
            sed -i 's#</activity>#    <intent-filter>\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="us.youtility.knock" />\n            </intent-filter>\n        </activity>#' "$MANIFEST"
      - name: Target Android 15 (API 35) for Play compliance
        script: |
          # Google Play requires new apps to target API 35. Bump the SDK levels
          # and the Gradle/AGP toolchain that supports compiling against 35.
          VARS=youtilityknock-web/android/variables.gradle
          sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/' "$VARS"
          sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/' "$VARS"
          sed -i "s#com.android.tools.build:gradle:8.2.1#com.android.tools.build:gradle:8.6.1#" \
            youtilityknock-web/android/build.gradle
          sed -i "s#gradle-8.2.1-all.zip#gradle-8.9-all.zip#" \
            youtilityknock-web/android/gradle/wrapper/gradle-wrapper.properties
      - name: Configure release signing & version
        script: |
          # Codemagic exposes the uploaded keystore via CM_* env vars when
          # `android_signing` is set. Gradle merges repeated `android {}`
          # blocks, so we just append a release signing + version config.
          cat >> youtilityknock-web/android/app/build.gradle <<'GRADLE'

          android {
              defaultConfig {
                  versionCode (System.getenv("BUILD_NUMBER") ?: "1").toInteger() + 1
                  // Auto-incrementing patch (major.minor from VERSION_NAME) so the
                  // versionName always rises without a manual bump each release.
                  versionName (System.getenv("VERSION_NAME") ?: "1.0") + "." + (System.getenv("BUILD_NUMBER") ?: "0")
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("CM_KEYSTORE_PATH"))
                      storePassword System.getenv("CM_KEYSTORE_PASSWORD")
                      keyAlias System.getenv("CM_KEY_ALIAS")
                      keyPassword System.getenv("CM_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE
      - name: Build signed AAB
        script: |
          cd youtilityknock-web/android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - youtilityknock-web/android/app/build/outputs/**/*.aab
      - youtilityknock-web/android/app/build/outputs/**/mapping.txt
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
