name: Deploy to Firebase

# Auto-deploys Hosting + Functions to the youtilityknock Firebase project on
# every push to main, so merges go live without the manual Cloud Shell dance.
# Can also be run on demand from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys race; queue them instead.
concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # extra headroom for deploy retries on transient quota limits
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Root devDeps include firebase-tools; the build scripts install the
      # web-app and functions deps under youtilityknock-web themselves.
      - name: Install tooling (firebase-tools)
        run: npm install

      - name: Build web app + assemble public/
        run: npm run build

      - name: Build Cloud Functions
        run: npm run build:functions

      # Authenticate the Firebase CLI with a service-account key stored as a
      # repo secret. The key never appears in logs.
      - name: Write service-account key
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/gcp-sa.json"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/gcp-sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Hosting + Functions + security rules
        # Include firestore:rules and storage so rule changes (e.g. new
        # collections) actually ship. firestore:rules deploys ONLY the rules —
        # not indexes — so --force can't drop indexes that aren't in the repo.
        #
        # Retry on transient failures: deploying ~50 functions can brush the
        # Cloud Functions "mutation requests per minute per region" quota (HTTP
        # 429), especially when several merges land back-to-back. A retry with
        # backoff lets the per-minute quota reset; firebase skips functions that
        # already updated, so each retry does less work and clears the limit.
        run: |
          attempt=1; max=4
          until npx firebase-tools deploy --only hosting,functions,firestore:rules,storage --project youtilityknock --non-interactive --force; do
            if [ "$attempt" -ge "$max" ]; then echo "::error::Deploy failed after $max attempts"; exit 1; fi
            wait=$((attempt * 75))
            echo "::warning::Deploy attempt $attempt/$max failed (likely a transient quota limit); retrying in ${wait}s…"
            sleep "$wait"
            attempt=$((attempt + 1))
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json

      # Deploy Firestore composite indexes separately and WITHOUT --force. New
      # indexes (e.g. leads assignedTo+status that the weekly-close count needs)
      # build asynchronously after this completes. No --force means it never
      # deletes indexes that exist in the console but aren't in the repo, so this
      # is safe to run on every push. Index builds can take a few minutes; the
      # queries fall back gracefully until they're ready.
      - name: Deploy Firestore indexes
        run: |
          attempt=1; max=3
          until npx firebase-tools deploy --only firestore:indexes --project youtilityknock --non-interactive; do
            if [ "$attempt" -ge "$max" ]; then echo "::error::Index deploy failed after $max attempts"; exit 1; fi
            echo "::warning::Index deploy attempt $attempt/$max failed; retrying in 45s…"
            sleep 45
            attempt=$((attempt + 1))
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-sa.json
